# Test Configuration - All Protocols
# Covers Modbus TCP, MQTT, OPC-UA, and EtherNet/IP with minimal devices for validation

facility:
  name: "Protocol Test Facility"
  description: "End-to-end test config for all implemented protocols"
  location: "Virtual Test Floor"
  shift_schedule: "24x7"

simulation:
  time_acceleration: 1.0
  data_retention: "1h"
  fault_injection_rate: 0.0

network:
  base_ip: "192.168.100.0/24"
  port_ranges:
    modbus: [15000, 15100]
    opcua: [4840, 4940]
    mqtt: [1883, 1883]
    http: [8080, 8099]
    ethernet_ip: [44818, 44918]

industrial_protocols:

  # ── Modbus TCP ──────────────────────────────────────────────────
  modbus_tcp:
    enabled: true
    devices:
      temperature_sensors:
        count: 1
        port_start: 15000
        device_template: "industrial_temperature_sensor"
        locations: ["test_line_1"]
        update_interval: 2.0
        data_config:
          temperature_range: [18, 45]
          humidity_range: [30, 80]
          calibration_drift: 0.001

      pressure_transmitters:
        count: 1
        port_start: 15001
        device_template: "hydraulic_pressure_sensor"
        locations: ["test_press_1"]
        update_interval: 1.0
        data_config:
          pressure_range: [0, 300]
          flow_range: [10, 150]
          alarm_thresholds:
            high_pressure: 250
            low_flow: 20

      motor_drives:
        count: 1
        port_start: 15002
        device_template: "variable_frequency_drive"
        locations: ["test_conveyor_1"]
        update_interval: 0.5
        data_config:
          speed_range: [0, 3600]
          torque_range: [0, 500]
          power_range: [0, 100]

  # ── MQTT ────────────────────────────────────────────────────────
  mqtt:
    enabled: true
    use_embedded_broker: true
    broker_host: "localhost"
    broker_port: 1883
    client_id_prefix: "test_sim_"
    devices:
      environmental_sensors:
        count: 2
        device_template: "iot_environmental_sensor"
        base_topic: "test/floor1/environment"
        publish_interval: 5.0
        qos: 1
        data_config:
          temperature_range: [18, 35]
          humidity_range: [30, 80]

      energy_meters:
        count: 1
        device_template: "smart_meter"
        base_topic: "test/energy"
        publish_interval: 10.0
        qos: 1
        data_config:
          voltage_range: [220, 240]
          current_range: [0, 100]
          power_factor_range: [0.85, 0.99]

      asset_trackers:
        count: 2
        device_template: "asset_tracker"
        base_topic: "test/assets"
        publish_interval: 15.0
        qos: 0
        data_config:
          zone_ids: ["zone_a", "zone_b", "zone_c"]
          battery_drain_rate: 0.001

  # ── OPC-UA ──────────────────────────────────────────────────────
  opcua:
    enabled: true
    security_mode: "None"
    security_policy: "None"
    application_uri: "urn:protocol-sim-engine:test:opcua:server"
    devices:
      cnc_machines:
        count: 1
        port_start: 4840
        device_template: "opcua_cnc_machine"
        locations: ["test_machining_1"]
        update_interval: 1.0
        data_config:
          spindle_speed_range: [0, 24000]
          feed_rate_range: [0, 15000]
          base_spindle_speed: 12000
          base_feed_rate: 5000
          tool_wear_rate: 0.01
          workspace_mm: [500, 400, 300]
          programs: ["G-Code_001", "G-Code_002"]

      plc_controllers:
        count: 1
        port_start: 4841
        device_template: "opcua_plc_controller"
        locations: ["test_process_1"]
        update_interval: 0.5
        data_config:
          process_value_range: [0, 100]
          setpoint: 50.0
          kp: 1.0
          ki: 0.1
          kd: 0.05
          high_alarm: 90
          low_alarm: 10

      industrial_robots:
        count: 1
        port_start: 4842
        device_template: "opcua_industrial_robot"
        locations: ["test_assembly_1"]
        update_interval: 0.5
        data_config:
          joint_count: 6
          max_speed_percent: 100
          base_cycle_time: 15.0
          payload_range: [0, 20]

  # ── EtherNet/IP ─────────────────────────────────────────────────
  ethernet_ip:
    enabled: true
    devices:
      controllogix_plcs:
        count: 1
        port_start: 44818
        device_template: "eip_controllogix_plc"
        locations: ["test_process_cell_1"]
        update_interval: 1.0
        data_config:
          process_value_range: [0, 100]
          setpoint: 50.0
          kp: 1.0
          ki: 0.1
          kd: 0.05
          high_alarm: 90
          low_alarm: 10
          cycle_time_ms: 1000

      powerflex_drives:
        count: 1
        port_start: 44819
        device_template: "eip_powerflex_drive"
        locations: ["test_conveyor_drive_1"]
        update_interval: 0.5
        data_config:
          frequency_range: [0, 60]
          base_frequency: 50.0
          max_current: 50.0
          v_per_hz: 7.6
          max_torque: 500
          accel_time: 5.0

      io_modules:
        count: 1
        port_start: 44820
        device_template: "eip_io_module"
        locations: ["test_io_rack_1"]
        update_interval: 0.5
        data_config:
          slot_number: 1
          ao_0_setpoint: 50.0
          ao_1_setpoint: 25.0
          ao_2_setpoint: 75.0
          ao_3_setpoint: 50.0
